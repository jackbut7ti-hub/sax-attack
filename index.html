<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sax Attack – Boka tid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: black;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h2 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .times {
            margin-top: 20px;
            padding: 15px;
            background: #eee;
            border-radius: 8px;
        }
        .times span {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .free { background: #4CAF50; color: white; }
        .taken { background: #E53935; color: white; cursor: not-allowed; }
        .selected { outline: 3px solid #1b5e20; }
    </style>
</head>
<body>

<header>Sax Attack – Boka tid</header>

<div class="container">

    <h2>Välj datum</h2>
    <input type="date" id="datePicker" required>

    <h2>Välj tid</h2>
    <div class="times">
        <!-- Lediga -->
        <span class="free" onclick="selectTime('09:00')">09:00</span>
        <span class="free" onclick="selectTime('09:30')">09:30</span>

        <!-- Upptagna -->
        <span class="taken">10:00</span>
        <span class="taken">10:30</span>
        <span class="taken">11:00</span>
        <span class="taken">11:30</span>
        <span class="taken">12:00</span>
        <span class="taken">12:30</span>

        <!-- Lediga -->
        <span class="free" onclick="selectTime('13:00')">13:00</span>
        <span class="free" onclick="selectTime('13:30')">13:30</span>

        <!-- Upptagna -->
        <span class="taken">14:00</span>
        <span class="taken">14:30</span>
        <span class="taken">15:00</span>
        <span class="taken">15:30</span>
    </div>

    <h2>Boka tid</h2>
    <form action="https://formspree.io/f/mlgarppj" method="POST">

        <label>Namn</label>
        <input type="text" name="name" required>

        <label>Telefonnummer</label>
        <input type="tel" name="phone" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Valt datum</label>
        <input type="text" id="selectedDate" name="date" readonly required>

        <label>Vald tid</label>
        <input type="text" id="timeInput" name="time" readonly required>

        <label>Meddelande / önskemål</label>
        <textarea name="message" required></textarea>

        <button type="submit">Skicka bokning</button>
    </form>

</div>

<script>
document.getElementById("datePicker").addEventListener("change", function() {
    document.getElementById("selectedDate").value = this.value;
});

function selectTime(time) {
    document.getElementById("timeInput").value = time;

    const allTimes = document.querySelectorAll('.times span');
    allTimes.forEach(t => t.classList.remove("selected"));

    const selected = Array.from(allTimes).find(t => t.textContent === time);
    if (selected) {
        selected.classList.add("selected");
    }
}
</script>

</body>
</html>
