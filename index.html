<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sax Attack – Boka tid</title>

    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
        header { background: #111; color: white; padding: 20px; text-align: center; }
        .container { width: 90%; max-width: 600px; margin: 30px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; }

        /* Prislista */
        .price-box { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .price-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #ccc; }
        .price-item:last-child { border-bottom: none; }

        /* Tider */
        .time-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #c62828; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .time-btn:hover { background: #a71f1f; }

        /* Fullbokade tider */
        .full {
            background: #777 !important;
            cursor: not-allowed;
        }

        /* Formulär */
        form { margin-top: 20px; display: none; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; }
        button[type="submit"] { background: #111; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; }
        button[type="submit"]:hover { background: #333; }

        footer { text-align: center; padding: 20px; color: #555; }
    </style>
</head>
<body>

<header>
    <h1>Sax Attack – Boka tid</h1>
</header>

<div class="container">

    <!-- PRISLISTA -->
    <h2>Priser</h2>
    <div class="price-box">
        <div class="price-item"><span>Herrklippning</span><span>250 kr</span></div>
        <div class="price-item"><span>Barnklippning</span><span>200 kr</span></div>
        <div class="price-item"><span>Skin fade</span><span>300 kr</span></div>
        <div class="price-item"><span>Skägg</span><span>150 kr</span></div>
        <div class="price-item"><span>Klippning + skägg</span><span>350 kr</span></div>
    </div>

    <!-- TIDER -->
    <h2>Välj en tid</h2>

    <!-- Lediga tider -->
    <button class="time-btn" onclick="selectTime('09:00–09:30')">09:00–09:30</button>
    <button class="time-btn" onclick="selectTime('13:00–13:30')">13:00–13:30</button>

    <!-- Fullbokade tider -->
    <button class="time-btn full" disabled>10:00–10:30 (Fullbokad)</button>
    <button class="time-btn full" disabled>11:00–11:30 (Fullbokad)</button>
    <button class="time-btn full" disabled>14:00–14:30 (Fullbokad)</button>
    <button class="time-btn full" disabled>15:00–15:30 (Fullbokad)</button>

    <!-- FORMULÄR -->
    <form id="bookingForm" action="https://formspree.io/f/meevjzwj" method="POST">
        <h3>Fyll i dina uppgifter</h3>

        <input type="text" name="namn" placeholder="Ditt namn" required>
        <input type="text" name="telefon" placeholder="Telefonnummer" required>
        <textarea name="meddelande" placeholder="Meddelande (valfritt)"></textarea>

        <input type="hidden" name="vald_tid" id="selectedTime">

        <button type="submit">Skicka bokning</button>
    </form>

</div>

<footer>
    © 2026 Sax Attack – Alla rättigheter reserverade
</footer>

<script>
function selectTime(time) {
    document.getElementById("selectedTime").value = time;
    document.getElementById("bookingForm").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
