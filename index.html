
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sax Attack – Boka tid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: black;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
        }
        .container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        h2 {
            margin-top: 0;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .times {
            margin-top: 20px;
            padding: 15px;
            background: #eee;
            border-radius: 8px;
        }
        .times span {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .free { background: #4CAF50; color: white; }
        .taken { background: #E53935; color: white; cursor: not-allowed; }
        .selected { outline: 3px solid #1b5e20; }

        /* Adminpanel */
        .admin-container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }
        th {
            background: #f0f0f0;
        }
        .badge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 12px;
            color: white;
        }
        .badge-active { background: #4CAF50; }
        .badge-cancelled { background: #E53935; }
    </style>
</head>
<body>

<header>Sax Attack – Boka tid</header>

<div class="container">

    <h2>Välj datum</h2>
    <input type="date" id="datePicker" required>

    <h2>Välj tid</h2>
    <div class="times" id="timeSlots"></div>

    <h2>Boka tid</h2>
    <form action="https://formspree.io/f/mlgarppj" method="POST" onsubmit="return handleSubmit()">

        <label>Namn</label>
        <input type="text" name="name" id="nameInput" required>

        <label>Telefonnummer</label>
        <input type="tel" name="phone" id="phoneInput" required>

        <label>Email</label>
        <input type="email" name="email" id="emailInput" required>

        <label>Valt datum</label>
        <input type="text" id="selectedDate" name="date" readonly required>

        <label>Vald tid</label>
        <input type="text" id="timeInput" name="time" readonly required>

        <label>Meddelande / önskemål</label>
        <textarea name="message" id="messageInput" required></textarea>

        <button type="submit">Skicka bokning</button>
    </form>

</div>

<!-- ADMINPANEL -->
<div class="admin-container">
    <h2>Admin – Bokningar</h2>
    <p>Här ser du alla bokningar som sparats i webbläsaren (LocalStorage).</p>
    <div id="adminPanel"></div>
</div>

<script>
    const datePicker = document.getElementById("datePicker");
    const selectedDateInput = document.getElementById("selectedDate");
    const timeInput = document.getElementById("timeInput");
    const timeSlotsContainer = document.getElementById("timeSlots");

    const today = new Date().toISOString().split("T")[0];
    datePicker.min = today;

    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

    // LEDIGA TIDER (grön)
    const dailyFreeTimes = ["09:00", "13:00"];

    // ALLTID BOKADE TIDER (röd)
    const alwaysTakenTimes = ["09:30", "13:30"];

    function generateTimeSlots() {
        timeSlotsContainer.innerHTML = "";
        const startHour = 9;
        const endHour = 15;
        const minutesStep = 30;

        for (let hour = startHour; hour <= endHour; hour++) {
            for (let min = 0; min < 60; min += minutesStep) {
                const h = hour.toString().padStart(2, "0");
                const m = min.toString().padStart(2, "0");
                const timeStr = `${h}:${m}`;

                const span = document.createElement("span");
                span.textContent = timeStr;

                if (alwaysTakenTimes.includes(timeStr)) {
                    span.classList.add("taken");
                    span.onclick = null;
                } else if (dailyFreeTimes.includes(timeStr)) {
                    span.classList.add("free");
                    span.onclick = () => selectTime(timeStr);
                } else {
                    span.classList.add("taken");
                    span.onclick = null;
                }

                timeSlotsContainer.appendChild(span);
            }
        }
    }

    function updateBookedTimes() {
        const date = datePicker.value;
        const allTimes = document.querySelectorAll("#timeSlots span");

        allTimes.forEach(t => {
            const time = t.textContent;

            if (alwaysTakenTimes.includes(time)) {
                t.classList.remove("free");
                t.classList.add("taken");
                t.onclick = null;
            } else if (dailyFreeTimes.includes(time)) {
                t.classList.remove("taken");
                t.classList.add("free");
                t.onclick = () => selectTime(time);
            } else {
                t.classList.remove("free");
                t.classList.add("taken");
                t.onclick = null;
            }

            t.classList.remove("selected");
        });

        if (!date) return;

        const now = new Date();
        const selectedDateObj = new Date(date);

        if (selectedDateObj.toDateString() === now.toDateString()) {
            allTimes.forEach(t => {
                const time = t.textContent;
                const [h, m] = time.split(":");
                const timeObj = new Date(date + "T" + h + ":" + m + ":00");

                if (timeObj < now) {
                    t.classList.remove("free");
                    t.classList.add("taken");
                    t.onclick = null;
                }
            });
        }

        const activeBookings = bookings.filter(b => !b.cancelled && b.date === date);

        activeBookings.forEach(b => {
            const span = Array.from(allTimes).find(t => t.textContent === b.time);
            if (span) {
                span.classList.remove("free");
                span.classList.add("taken");
                span.onclick = null;
            }
        });
    }

    datePicker.addEventListener("change", function () {
        selectedDateInput.value = this.value;
        updateBookedTimes();
    });

    function selectTime(time) {
        const date = datePicker.value;

        if (!date) {
            alert("Välj ett datum först.");
            return;
        }

        if (alwaysTakenTimes.includes(time)) {
            alert("Den här tiden är upptagen.");
            return;
        }

        const slotTaken = bookings.some(b => !b.cancelled && b.date === date && b.time === time);
        if (slotTaken) {
            alert("Den här tiden är redan bokad.");
            return;
        }

        timeInput.value = time;

        const allTimes = document.querySelectorAll('#timeSlots span');
        allTimes.forEach(t => t.classList.remove("selected"));

        const selected = Array.from(allTimes).find(t => t.textContent === time);
        if (selected) selected.classList.add("selected");
    }

    function handleSubmit() {
        const date = selectedDateInput.value;
        const time = timeInput.value;

        if (!date || !time) {
            alert("Välj datum och tid innan du bokar.");
            return false;
        }

        if (alwaysTakenTimes.includes(time)) {
            alert("Den här tiden är upptagen.");
            return false;
        }

        const slotTaken = bookings.some(b => !b.cancelled && b.date === date && b.time === time);
        if (slotTaken) {
            alert("Den här tiden är redan bokad.");
            return false;
        }

        const booking = {
            date,
            time,
            name: document.getElementById("nameInput").value,
            phone: document.getElementById("phoneInput").value,
            email: document.getElementById("emailInput").value,
            message: document.getElementById("messageInput").value,
            createdAt: new Date().toISOString(),
            cancelled: false
        };

        bookings.push(booking);
        localStorage.setItem("bookings", JSON.stringify(bookings));

        updateBookedTimes();
        renderAdminPanel();

        return true;
    }

    function renderAdminPanel() {
        const container = document.getElementById("adminPanel");

        if (bookings.length === 0) {
            container.innerHTML = "<p>Inga bokningar sparade ännu.</p>";
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Tid</th>
                        <th>Namn</th>
                        <th>Telefon</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Åtgärd</th>
                    </tr>
                </thead>
                <tbody>
        `;

        bookings.forEach((b, index) => {
            const statusText = b.cancelled ? "Avbokad" : "Aktiv";
            const statusClass = b.cancelled ? "badge-cancelled" : "badge-active";

            html += `
                <tr>
                    <td>${b.date}</td>
                    <td>${b.time}</td>
                    <td>${b.name}</td>
                    <td>${b.phone}</td>
                    <td>${b.email}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button type="button" style="padding:6px 10px;font-size:12px;width:auto"
                            onclick="cancelBooking(${index})">
                            Avboka
                        </button>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function cancelBooking(index) {
        const booking = bookings[index];
        if (!booking || booking.cancelled) return;

        const bookingDateTime = new Date(`${booking.date}T${booking.time}:00`);
        const now = new Date();

        if (now < bookingDateTime) {
            alert("Du kan inte avboka förrän efter den bokade tiden har passerat.");
            return;
        }

        if (!confirm(`Avboka tiden ${booking.date} kl ${booking.time} för ${booking.name}?`)) {
            return;
        }

        booking.cancelled = true;
        localStorage.setItem("bookings", JSON.stringify(bookings));

        updateBookedTimes();
        renderAdminPanel();
    }

    generateTimeSlots();
    renderAdminPanel();
</script>

</body>
</html>
